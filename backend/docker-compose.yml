version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vacay
      POSTGRES_PASSWORD: vacay_password
      POSTGRES_DB: vacay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacay -d vacay_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
